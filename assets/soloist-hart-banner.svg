<svg width="960" height="300" viewBox="0 0 960 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Soloist Hart retro signal banner</title>
  <desc id="desc">A retro terminal-inspired GitHub profile banner with signal grid styling and an ASCII self portrait panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#090807" />
      <stop offset="0.56" stop-color="#12100D" />
      <stop offset="1" stop-color="#17130F" />
    </linearGradient>
    <linearGradient id="amber" x1="72" y1="64" x2="420" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD089" />
      <stop offset="0.46" stop-color="#F6BD60" />
      <stop offset="1" stop-color="#D69024" />
    </linearGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 7.5H8" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
    </pattern>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="rgba(246,189,96,0.08)" stroke-width="1" />
    </pattern>
    <filter id="softGlow" x="0" y="0" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="portraitClip">
      <rect x="640" y="56" width="248" height="188" rx="18" />
    </clipPath>
  </defs>

  <rect width="960" height="300" rx="28" fill="url(#bg)" />
  <rect width="960" height="300" rx="28" fill="url(#scan)" />
  <rect width="960" height="300" rx="28" fill="url(#grid)" opacity="0.8" />
  <rect x="14" y="14" width="932" height="272" rx="20" stroke="rgba(255,255,255,0.1)" />
  <rect x="34" y="34" width="892" height="232" rx="18" stroke="rgba(246,189,96,0.18)" />

  <circle cx="68" cy="58" r="5" fill="#FF6B57" />
  <circle cx="86" cy="58" r="5" fill="#F6BD60" />
  <circle cx="104" cy="58" r="5" fill="#6BCB77" />
  <text x="132" y="62" fill="#BDA585" font-family="'Courier New', monospace" font-size="12" letter-spacing="1.8">soloisthart.signal / profile.readme</text>

  <text x="66" y="98" fill="#8A7356" font-family="'Courier New', monospace" font-size="11" letter-spacing="2.4">RETRO SIGNAL README</text>
  <text x="64" y="146" fill="url(#amber)" font-family="'Courier New', monospace" font-size="46" font-weight="700" letter-spacing="1.2">SOLOIST HART</text>
  <text x="66" y="173" fill="#F5EDE1" font-family="'Courier New', monospace" font-size="14.5" letter-spacing="0.25">AI engineer / workflow automation specialist</text>
  <text x="66" y="194" fill="#C6B39A" font-family="'Courier New', monospace" font-size="13" letter-spacing="0.2">system-minded builder for internal tools and applied AI</text>

  <text x="66" y="224" fill="#C6B39A" font-family="'Courier New', monospace" font-size="13">&gt; whoami</text>
  <text x="162" y="224" fill="#F5EDE1" font-family="'Courier New', monospace" font-size="13">Rhohart Martel</text>
  <text x="66" y="246" fill="#C6B39A" font-family="'Courier New', monospace" font-size="13">&gt; build_mode</text>
  <text x="194" y="246" fill="#F5EDE1" font-family="'Courier New', monospace" font-size="13">dashboards / AI systems / automation</text>
  <text x="66" y="268" fill="#C6B39A" font-family="'Courier New', monospace" font-size="13">&gt; status</text>
  <text x="154" y="268" fill="#F6BD60" font-family="'Courier New', monospace" font-size="13">ONLINE</text>

  <rect x="640" y="56" width="248" height="188" rx="18" fill="rgba(7,6,5,0.72)" stroke="rgba(246,189,96,0.24)" />
  <rect x="640" y="56" width="248" height="188" rx="18" fill="url(#scan)" opacity="0.65" />
  <text x="660" y="79" fill="#8A7356" font-family="'Courier New', monospace" font-size="10" letter-spacing="1.8">identity.render / ascii portrait</text>
  <g clip-path="url(#portraitClip)">
    <text x="668" y="101" fill="#F1C77B" font-family="'Courier New', monospace" font-size="5.7" xml:space="preserve">
      <tspan x="668" dy="0">        ::::</tspan>
      <tspan x="668" dy="9">        ;+XX++;;+X$$XXX:</tspan>
      <tspan x="668" dy="9">          :;+XXX++;+X$&amp;&amp;&amp;X</tspan>
      <tspan x="668" dy="9">            :+X+</tspan>
      <tspan x="668" dy="9">   :++      ;$X+    :X$&amp;&amp;&amp;&amp;&amp;$</tspan>
      <tspan x="668" dy="9">      ;     $&amp;&amp;X     +$&amp;&amp;&amp;&amp;&amp;&amp;&amp;+</tspan>
      <tspan x="668" dy="9">     :      XX&amp;+       :$$&amp;&amp;&amp;&amp;$</tspan>
      <tspan x="668" dy="9">           :$&amp;&amp;:X     +:  :&amp;&amp;&amp;&amp;;</tspan>
      <tspan x="668" dy="9">            ;$&amp;&amp;&amp;&amp;X:  +$&amp;&amp;&amp;&amp;&amp;&amp;$X</tspan>
      <tspan x="668" dy="9">             +;X&amp;$&amp;&amp;$+X$&amp;&amp;&amp;&amp;$&amp;&amp;;</tspan>
      <tspan x="668" dy="9">             +  :&amp;X$X:::;+&amp;&amp;&amp;&amp;&amp;&amp;</tspan>
      <tspan x="668" dy="9">          +X+$&amp;X ++;+$&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;</tspan>
      <tspan x="668" dy="9">          $X +&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;$&amp;$</tspan>
      <tspan x="668" dy="9">            ;;+$&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;$ ;</tspan>
      <tspan x="668" dy="9">                 +&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;+</tspan>
    </text>
  </g>

  <path d="M590 32V268" stroke="rgba(246,189,96,0.18)" stroke-width="1" stroke-dasharray="4 8" />
  <path d="M52 188H564" stroke="rgba(246,189,96,0.22)" stroke-width="1" />
  <circle cx="560" cy="188" r="3" fill="#F6BD60" filter="url(#softGlow)" />
  <text x="640" y="262" fill="#8A7356" font-family="'Courier New', monospace" font-size="10" letter-spacing="1.2">systems with taste / shipped work over noise</text>
</svg>