  <rect width="900" height="180" rx="28" fill="url(#bg)" />
  <circle cx="796" cy="48" r="92" fill="#F6BD60" fill-opacity="0.08" />
  <circle cx="734" cy="128" r="70" fill="#84A59D" fill-opacity="0.12" />
  <path d="M0 129C95 92 171 88 239 105C321 125 385 148 468 145C566 141 632 93 713 85C777 79 836 93 900 128V180H0V129Z" fill="#F6BD60" fill-opacity="0.08" />

