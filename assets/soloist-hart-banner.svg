<svg width="900" height="180" viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Soloist Hart banner</title>
  <desc id="desc">A custom profile banner for the SoloistHart GitHub profile README.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101826" />
      <stop offset="0.55" stop-color="#14213D" />
      <stop offset="1" stop-color="#223A5E" />
    </linearGradient>
    <linearGradient id="accent" x1="92" y1="52" x2="672" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6BD60" />
