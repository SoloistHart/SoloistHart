<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Soloist Hart professional profile hero</title>
  <desc id="desc">A professional animated profile hero for Soloist Hart with concise positioning, refined dark styling, and an impact snapshot panel.</desc>
  <style>
    .ui {
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .eyebrow {
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .pulse {
      animation: pulse 3s ease-in-out infinite;
    }

    .fade {
      animation: fade 5s ease-in-out infinite;
    }

    .sweep {
      animation: sweep 6s linear infinite;
    }

    .bar-fill {
      transform-origin: left center;
      animation: fill 4.2s ease-in-out infinite;
    }

    .halo {
      animation: drift 10s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }

    @keyframes fade {
      0%, 100% { opacity: 0.82; }
      50% { opacity: 1; }
    }

    @keyframes sweep {
      0% { transform: translateX(-220px); }
      100% { transform: translateX(1020px); }
    }

    @keyframes fill {
      0%, 12% {
        opacity: 0.25;
        transform: scaleX(0.18);
      }
      42% {
        opacity: 1;
        transform: scaleX(0.96);
      }
      76% {
        opacity: 0.8;
        transform: scaleX(0.72);
      }
      100% {
        opacity: 0.25;
        transform: scaleX(0.18);
      }
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-12px, 8px); }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1016" />
      <stop offset="0.56" stop-color="#101722" />
      <stop offset="1" stop-color="#151C28" />
    </linearGradient>
    <linearGradient id="accent" x1="60" y1="94" x2="412" y2="188" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1D4A3" />
      <stop offset="0.48" stop-color="#D8B77A" />
      <stop offset="1" stop-color="#B78B44" />
    </linearGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 7.5H8" stroke="rgba(255,255,255,0.035)" stroke-width="1" />
    </pattern>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="rgba(216,183,122,0.06)" stroke-width="1" />
    </pattern>
    <filter id="softGlow" x="0" y="0" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8B77A" stop-opacity="0" />
      <stop offset="0.5" stop-color="#D8B77A" stop-opacity="0.9" />
      <stop offset="1" stop-color="#D8B77A" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="960" height="320" rx="28" fill="url(#bg)" />
  <rect width="960" height="320" rx="28" fill="url(#scan)" />
  <rect width="960" height="320" rx="28" fill="url(#grid)" opacity="0.8" />
  <rect x="14" y="14" width="932" height="292" rx="20" stroke="rgba(255,255,255,0.1)" />
  <rect x="34" y="34" width="892" height="252" rx="18" stroke="rgba(216,183,122,0.16)" />

  <circle cx="710" cy="80" r="96" fill="rgba(216,183,122,0.08)" class="halo" filter="url(#softGlow)" />
  <circle cx="804" cy="98" r="42" fill="rgba(216,183,122,0.08)" class="pulse" />

  <text x="66" y="88" fill="#8E98A5" class="ui eyebrow" font-size="11">AI ENGINEER  •  WORKFLOW AUTOMATION SPECIALIST</text>
  <text x="64" y="148" fill="url(#accent)" class="ui" font-size="54" font-weight="700" letter-spacing="0.4">Rhohart Martel</text>
  <text x="66" y="184" fill="#E8E2D8" class="ui" font-size="18">Building internal tools, workflow systems, and AI-assisted reporting products.</text>
  <text x="66" y="212" fill="#A8B1BE" class="ui" font-size="13.5">Focused on execution, clarity, and business-facing technical outcomes.</text>

  <path d="M60 238H586" stroke="rgba(216,183,122,0.28)" stroke-width="1" />

  <rect x="64" y="255" width="118" height="28" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(216,183,122,0.2)" />
  <rect x="194" y="255" width="146" height="28" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(216,183,122,0.2)" />
  <rect x="352" y="255" width="132" height="28" rx="14" fill="rgba(255,255,255,0.03)" stroke="rgba(216,183,122,0.2)" />
  <text x="86" y="273" fill="#D7C8B1" class="ui" font-size="12">AI Systems</text>
  <text x="224" y="273" fill="#D7C8B1" class="ui" font-size="12">Workflow Automation</text>
  <text x="389" y="273" fill="#D7C8B1" class="ui" font-size="12">Internal Tools</text>

  <rect x="614" y="54" width="276" height="214" rx="24" fill="rgba(8,12,18,0.62)" stroke="rgba(216,183,122,0.22)" />
  <text x="646" y="88" fill="#8E98A5" class="ui eyebrow" font-size="10">IMPACT SNAPSHOT</text>
  <text x="646" y="122" fill="#F4EFE7" class="ui" font-size="28" font-weight="700">30+ workflows</text>
  <text x="646" y="144" fill="#A8B1BE" class="ui fade" font-size="13">Personalized automation systems shipped across operational use cases.</text>

  <path d="M646 168H858" stroke="rgba(216,183,122,0.18)" stroke-width="1" />

  <text x="646" y="194" fill="#F4EFE7" class="ui" font-size="28" font-weight="700">50% lift</text>
  <text x="646" y="216" fill="#A8B1BE" class="ui fade" font-size="13">Improvement achieved in one deployed QA analytics campaign.</text>

  <text x="646" y="246" fill="#D7C8B1" class="ui" font-size="12.5">TypeScript  •  Next.js  •  Node.js</text>
  <rect x="646" y="256" width="176" height="6" rx="3" fill="rgba(216,183,122,0.12)" />
  <rect x="646" y="256" width="176" height="6" rx="3" fill="#D8B77A" class="bar-fill" filter="url(#softGlow)" />

  <g class="sweep">
    <rect x="0" y="0" width="200" height="320" fill="url(#sweepGrad)" opacity="0.12" />
  </g>
</svg>