<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Soloist Hart animated retro signal hero</title>
  <desc id="desc">An animated retro terminal hero with signal grid styling, an ASCII portrait reveal, and boot-sequence text for the SoloistHart GitHub profile README.</desc>
  <style>
    .ui {
      font-family: 'Courier New', monospace;
    }

    .boot-line {
      opacity: 0;
      animation: fadeup 7s ease-in-out infinite;
    }

    .boot-1 { animation-delay: 0.3s; }
    .boot-2 { animation-delay: 0.8s; }
    .boot-3 { animation-delay: 1.3s; }
    .boot-4 { animation-delay: 1.8s; }
    .portrait {
      opacity: 0;
      animation: reveal 7s ease-in-out infinite;
      animation-delay: 1.2s;
    }

    .cursor {
      animation: blink 1s steps(2, end) infinite;
    }

    .signal-dot {
      animation: pulse 2s ease-in-out infinite;
    }

    .title-glow {
      animation: glow 4s ease-in-out infinite;
    }

    .sweep {
      animation: sweep 5s linear infinite;
    }

    .footer-copy {
      animation: blink-soft 3s ease-in-out infinite;
    }

    .sync-bar {
      transform-origin: left center;
      animation: sync 3.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 46% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    @keyframes glow {
      0%, 100% { opacity: 0.92; }
      50% { opacity: 1; }
    }

    @keyframes blink-soft {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    @keyframes reveal {
      0%, 16% { opacity: 0; }
      24%, 86% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes fadeup {
      0%, 8% {
        opacity: 0;
        transform: translateY(5px);
      }
      16%, 82% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(0);
      }
    }

    @keyframes sweep {
      0% { transform: translateX(-280px); }
      100% { transform: translateX(1040px); }
    }

    @keyframes sync {
      0%, 8% {
        opacity: 0.25;
        transform: scaleX(0.08);
      }
      40% {
        opacity: 1;
        transform: scaleX(0.98);
      }
      72% {
        opacity: 0.9;
        transform: scaleX(0.68);
      }
      100% {
        opacity: 0.25;
        transform: scaleX(0.08);
      }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080706" />
      <stop offset="0.58" stop-color="#100D0A" />
      <stop offset="1" stop-color="#16110D" />
    </linearGradient>
    <linearGradient id="amber" x1="64" y1="72" x2="438" y2="186" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD48E" />
      <stop offset="0.5" stop-color="#F6BD60" />
      <stop offset="1" stop-color="#D88E1E" />
    </linearGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 7.5H8" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
    </pattern>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="rgba(246,189,96,0.08)" stroke-width="1" />
    </pattern>
    <clipPath id="portraitClip">
      <rect x="684" y="58" width="202" height="200" rx="18" />
    </clipPath>
    <filter id="softGlow" x="0" y="0" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="960" height="320" rx="28" fill="url(#bg)" />
  <rect width="960" height="320" rx="28" fill="url(#scan)" />
  <rect width="960" height="320" rx="28" fill="url(#grid)" opacity="0.8" />
  <rect x="14" y="14" width="932" height="292" rx="20" stroke="rgba(255,255,255,0.1)" />
  <rect x="34" y="34" width="892" height="252" rx="18" stroke="rgba(246,189,96,0.16)" />

  <circle cx="68" cy="58" r="5" fill="#FF6B57" />
  <circle cx="86" cy="58" r="5" fill="#F6BD60" />
  <circle cx="104" cy="58" r="5" fill="#6BCB77" />
  <text x="132" y="62" fill="#BCA381" class="ui" font-size="12" letter-spacing="1.8">soloisthart.signal / animated-profile</text>

  <text x="66" y="98" fill="#8A7356" class="ui" font-size="11" letter-spacing="2.4">RETRO SIGNAL README</text>
  <text x="64" y="146" fill="url(#amber)" class="ui title-glow" font-size="46" font-weight="700" letter-spacing="1.2">SOLOIST HART</text>
  <text x="66" y="175" fill="#F5EDE1" class="ui" font-size="14.5" letter-spacing="0.25">AI engineer / workflow automation specialist</text>
  <text x="66" y="196" fill="#C6B39A" class="ui" font-size="12.5" letter-spacing="0.15">system-minded builder for internal tools and applied AI</text>

  <path d="M58 210H646" stroke="rgba(246,189,96,0.2)" stroke-width="1" />
  <path d="M668 44V276" stroke="rgba(246,189,96,0.16)" stroke-width="1" stroke-dasharray="4 8" />

  <g class="boot-line boot-1">
    <text x="66" y="232" fill="#C6B39A" class="ui" font-size="13">&gt; whoami</text>
    <text x="164" y="232" fill="#F5EDE1" class="ui" font-size="13">Rhohart Martel</text>
  </g>
  <g class="boot-line boot-2">
    <text x="66" y="254" fill="#C6B39A" class="ui" font-size="13">&gt; focus</text>
    <text x="156" y="254" fill="#F5EDE1" class="ui" font-size="13">dashboards / automation / AI systems</text>
  </g>
  <g class="boot-line boot-3">
    <text x="66" y="276" fill="#C6B39A" class="ui" font-size="13">&gt; status</text>
    <text x="156" y="276" fill="#F6BD60" class="ui signal-dot" font-size="13">ONLINE</text>
    <text x="206" y="276" fill="#F6BD60" class="ui cursor" font-size="13">_</text>
  </g>
  <g class="boot-line boot-4">
    <text x="430" y="232" fill="#BCA381" class="ui" font-size="11">loading visual identity modules</text>
  </g>
  <text x="430" y="250" fill="#8A7356" class="ui" font-size="10" letter-spacing="1.5">signal.sync</text>
  <rect x="430" y="258" width="150" height="6" rx="3" fill="rgba(246,189,96,0.12)" />
  <rect x="430" y="258" width="150" height="6" rx="3" fill="#F6BD60" class="sync-bar" filter="url(#softGlow)" />

  <g class="sweep">
    <rect x="0" y="0" width="160" height="320" fill="url(#sweepGrad)" opacity="0.18" />
  </g>

  <rect x="684" y="58" width="202" height="200" rx="18" fill="rgba(7,6,5,0.74)" stroke="rgba(246,189,96,0.24)" />
  <rect x="684" y="58" width="202" height="200" rx="18" fill="url(#scan)" opacity="0.65" />
  <text x="704" y="82" fill="#8A7356" class="ui" font-size="10" letter-spacing="1.7">identity.render / ascii portrait</text>

  <g class="portrait" clip-path="url(#portraitClip)">
    <text x="724" y="108" fill="#F1C77B" class="ui" font-size="5.4" xml:space="preserve">
      <tspan x="724" dy="0">   ::::</tspan>
      <tspan x="724" dy="9">   ;+XX++;;+X$$XXX:</tspan>
      <tspan x="724" dy="9">     :;+XXX++;+X$&amp;&amp;&amp;X</tspan>
      <tspan x="724" dy="9">       :+X+</tspan>
      <tspan x="724" dy="9">:++     ;$X+   :X$&amp;&amp;&amp;&amp;&amp;$</tspan>
      <tspan x="724" dy="9"> ;      $&amp;&amp;X    +$&amp;&amp;&amp;&amp;&amp;&amp;&amp;+</tspan>
      <tspan x="724" dy="9">:       XX&amp;+      :$$&amp;&amp;&amp;&amp;$</tspan>
      <tspan x="724" dy="9">       :$&amp;&amp;:X    +: :&amp;&amp;&amp;&amp;;</tspan>
      <tspan x="724" dy="9">        ;$&amp;&amp;&amp;&amp;X: +$&amp;&amp;&amp;&amp;&amp;&amp;$X</tspan>
      <tspan x="724" dy="9">         +;X&amp;$&amp;&amp;$+X$&amp;&amp;&amp;&amp;$&amp;&amp;;</tspan>
      <tspan x="724" dy="9">         +  :&amp;X$X:::;+&amp;&amp;&amp;&amp;&amp;&amp;</tspan>
      <tspan x="724" dy="9">      +X+$&amp;X ++;+$&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;</tspan>
      <tspan x="724" dy="9">      $X +&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;$&amp;$</tspan>
      <tspan x="724" dy="9">        ;;+$&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;$ ;</tspan>
      <tspan x="724" dy="9">             +&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;&amp;+</tspan>
    </text>
  </g>

  <circle cx="574" cy="204" r="3.5" fill="#F6BD60" filter="url(#softGlow)" class="signal-dot" />
  <text x="684" y="284" fill="#8A7356" class="ui footer-copy" font-size="10" letter-spacing="1.15">systems with taste / shipped work over noise</text>

  <defs>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="160" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6BD60" stop-opacity="0" />
      <stop offset="0.5" stop-color="#F6BD60" stop-opacity="0.95" />
      <stop offset="1" stop-color="#F6BD60" stop-opacity="0" />
    </linearGradient>
  </defs>
</svg>