    <rect x="426" y="148" width="38" height="38" rx="12" fill="rgba(216,183,122,0.12)" />
    <text x="438" y="172" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">NX</text>
    <text x="476" y="162" fill="#F2ECE4" class="ui" font-size="14">Next.js</text>
    <text x="476" y="182" fill="#A8B1BE" class="ui" font-size="12">Full-stack product surfaces</text>
  </g>

  <g class="tile-a">
