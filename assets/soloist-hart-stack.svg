    <rect x="602" y="148" width="38" height="38" rx="12" fill="rgba(216,183,122,0.16)" />
    <text x="612" y="172" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">ND</text>
    <text x="652" y="162" fill="#F2ECE4" class="ui" font-size="14">Node.js</text>
    <text x="652" y="182" fill="#A8B1BE" class="ui" font-size="12">Backend services</text>
  </g>

  <g class="tile-b">
    <rect x="760" y="130" width="160" height="74" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(216,183,122,0.18)" />
    <rect x="778" y="148" width="38" height="38" rx="12" fill="rgba(216,183,122,0.12)" />
    <text x="789" y="172" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">PG</text>
    <text x="828" y="162" fill="#F2ECE4" class="ui" font-size="14">PostgreSQL</text>
    <text x="828" y="182" fill="#A8B1BE" class="ui" font-size="12">Analytics data models</text>
  </g>

  <g class="tile-c">
    <rect x="56" y="214" width="160" height="74" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(216,183,122,0.18)" />
    <rect x="74" y="232" width="38" height="38" rx="12" fill="rgba(216,183,122,0.16)" />
    <text x="87" y="256" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">N8</text>
    <text x="124" y="246" fill="#F2ECE4" class="ui" font-size="14">n8n</text>
    <text x="124" y="266" fill="#A8B1BE" class="ui" font-size="12">Workflow orchestration</text>
  </g>

  <g class="tile-a">
    <rect x="232" y="214" width="160" height="74" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(216,183,122,0.18)" />
    <rect x="250" y="232" width="38" height="38" rx="12" fill="rgba(216,183,122,0.12)" />
    <text x="262" y="256" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">AI</text>
    <text x="300" y="246" fill="#F2ECE4" class="ui" font-size="14">OpenAI</text>
    <text x="300" y="266" fill="#A8B1BE" class="ui" font-size="12">Assistants and prompting</text>
  </g>

  <g class="tile-b">
