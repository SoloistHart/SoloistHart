    <rect x="426" y="232" width="38" height="38" rx="12" fill="rgba(216,183,122,0.12)" />
    <text x="438" y="256" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">MY</text>
    <text x="476" y="246" fill="#F2ECE4" class="ui" font-size="14">MySQL</text>
    <text x="476" y="266" fill="#A8B1BE" class="ui" font-size="12">Operational data layers</text>
  </g>

  <g class="tile-c">
    <rect x="584" y="214" width="160" height="74" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(216,183,122,0.18)" />
    <rect x="602" y="232" width="38" height="38" rx="12" fill="rgba(216,183,122,0.16)" />
    <text x="614" y="256" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">DK</text>
    <text x="652" y="246" fill="#F2ECE4" class="ui" font-size="14">Docker</text>
    <text x="652" y="266" fill="#A8B1BE" class="ui" font-size="12">Portable environments</text>
  </g>

  <g class="tile-a">
    <rect x="760" y="214" width="160" height="74" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(216,183,122,0.18)" />
    <rect x="778" y="232" width="38" height="38" rx="12" fill="rgba(216,183,122,0.12)" />
    <text x="789" y="256" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">GH</text>
    <text x="828" y="246" fill="#F2ECE4" class="ui" font-size="14">GitHub</text>
    <text x="828" y="266" fill="#A8B1BE" class="ui" font-size="12">Versioned delivery</text>
  </g>

  <circle cx="864" cy="62" r="28" fill="rgba(216,183,122,0.08)" class="pulse" />
  <circle cx="896" cy="84" r="7" fill="#D8B77A" class="pulse" />

  <g class="sweep">
    <rect x="0" y="0" width="180" height="270" fill="url(#sweepGrad)" opacity="0.1" />
