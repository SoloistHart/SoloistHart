<svg width="960" height="270" viewBox="0 0 960 270" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Soloist Hart tech stack overview</title>
  <desc id="desc">An icon-forward tech stack board showing the main platforms and tools used by Soloist Hart.</desc>
  <style>
    .ui {
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .eyebrow {
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .sweep {
      animation: sweep 7s linear infinite;
    }

    .pulse {
      animation: pulse 3.4s ease-in-out infinite;
    }

    .tile-a {
      animation: float 6s ease-in-out infinite;
    }

    .tile-b {
      animation: float 6s ease-in-out infinite 0.25s;
    }

    .tile-c {
      animation: float 6s ease-in-out infinite 0.5s;
    }

    @keyframes sweep {
      0% { transform: translateX(-200px); }
      100% { transform: translateX(980px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.95; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1016" />
      <stop offset="0.58" stop-color="#101722" />
      <stop offset="1" stop-color="#151C28" />
    </linearGradient>
    <linearGradient id="accent" x1="78" y1="52" x2="286" y2="102" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1D4A3" />
      <stop offset="0.48" stop-color="#D8B77A" />
      <stop offset="1" stop-color="#B78B44" />
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="rgba(216,183,122,0.06)" stroke-width="1" />
    </pattern>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="180" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8B77A" stop-opacity="0" />
      <stop offset="0.5" stop-color="#D8B77A" stop-opacity="0.8" />
      <stop offset="1" stop-color="#D8B77A" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="960" height="270" rx="24" fill="url(#bg)" />
  <rect width="960" height="270" rx="24" fill="url(#grid)" opacity="0.8" />
  <rect x="14" y="14" width="932" height="242" rx="18" stroke="rgba(255,255,255,0.08)" />
  <rect x="34" y="34" width="892" height="202" rx="18" stroke="rgba(216,183,122,0.14)" />

  <text x="56" y="66" fill="#8E98A5" class="ui eyebrow" font-size="11">TECH STACK</text>
  <text x="56" y="102" fill="url(#accent)" class="ui" font-size="30" font-weight="700">Core platforms and tools</text>

  <g class="tile-a">
    <rect x="56" y="130" width="160" height="74" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(216,183,122,0.18)" />
    <rect x="74" y="148" width="38" height="38" rx="12" fill="rgba(216,183,122,0.16)" />
    <text x="85" y="172" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">TS</text>
    <text x="124" y="162" fill="#F2ECE4" class="ui" font-size="14">TypeScript</text>
    <text x="124" y="182" fill="#A8B1BE" class="ui" font-size="12">Typed application logic</text>
  </g>

  <g class="tile-b">
