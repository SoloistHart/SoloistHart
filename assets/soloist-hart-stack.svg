    <rect x="250" y="148" width="38" height="38" rx="12" fill="rgba(216,183,122,0.12)" />
    <text x="264" y="172" fill="#F4EFE7" class="ui" font-size="15" font-weight="700">R</text>
    <text x="300" y="162" fill="#F2ECE4" class="ui" font-size="14">React</text>
    <text x="300" y="182" fill="#A8B1BE" class="ui" font-size="12">Interactive interfaces</text>
  </g>

